<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weather.ali.et</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="lattice"></canvas>
  <div class="vignette"></div>

  <div class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name">weather.ali.et</span>
      </div>
      <div class="conn-status" id="conn-status">
        <span class="conn-dot"></span>
        <span class="conn-label">connecting</span>
      </div>
    </header>

    <section class="hero">
      <div class="hero-reading">
        <div class="hero-value" id="hero-temp">--</div>
        <div class="hero-unit">C</div>
      </div>
      <div class="hero-meta">toilet server room</div>
    </section>

    <section class="metrics">
      <div class="metric">
        <div class="metric-icon metric-icon--humidity"></div>
        <div class="metric-data">
          <div class="metric-value" id="val-humidity">--</div>
          <div class="metric-label">humidity</div>
        </div>
      </div>
      <div class="metric">
        <div class="metric-icon metric-icon--light"></div>
        <div class="metric-data">
          <div class="metric-value" id="val-light">--</div>
          <div class="metric-label">light</div>
        </div>
      </div>
      <div class="metric">
        <div class="metric-icon metric-icon--dew"></div>
        <div class="metric-data">
          <div class="metric-value" id="val-dew">--</div>
          <div class="metric-label">dew point</div>
        </div>
      </div>
    </section>

    <section class="stats-row">
      <div class="stat">
        <span class="stat-key">24h high</span>
        <span class="stat-val" id="stat-high">--</span>
      </div>
      <div class="stat">
        <span class="stat-key">24h low</span>
        <span class="stat-val" id="stat-low">--</span>
      </div>
      <div class="stat">
        <span class="stat-key">24h avg</span>
        <span class="stat-val" id="stat-avg">--</span>
      </div>
      <div class="stat">
        <span class="stat-key">samples</span>
        <span class="stat-val" id="stat-count">--</span>
      </div>
    </section>

    <section class="charts">
      <div class="chart-card">
        <div class="chart-head">
          <span class="chart-title">temperature</span>
          <div class="chart-range" id="range-buttons">
            <button class="range-btn active" data-hours="6">6h</button>
            <button class="range-btn" data-hours="12">12h</button>
            <button class="range-btn" data-hours="24">24h</button>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="chart-temp"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-head">
          <span class="chart-title">humidity & light</span>
        </div>
        <div class="chart-wrap"><canvas id="chart-hl"></canvas></div>
      </div>
    </section>

    <footer class="footer">
      <span>sensors in the toilet server room</span>
      <span id="footer-time">--</span>
    </footer>
  </div>

  <script src="lattice.js"></script>
  <script src="app.js"></script>
</body>
</html>
